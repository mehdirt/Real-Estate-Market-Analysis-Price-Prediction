task: price
target_column: price_value

# Rows with price_value not null; sell categories only
sell_cat2_slugs:
  - residential-sell
  - commercial-sell
  - real-estate-services

feature_columns:
  - cat2_slug
  - cat3_slug
  - city_slug
  - building_size
  - deed_type
  - has_business_deed
  - floor
  - rooms_count
  - is_rebuilt
  - floor_material
  - construction_year
  - has_security_guard
  - has_barbecue
  - has_pool
  - has_jacuzzi
  - has_sauna
  - has_balcony
  - has_elevator
  - has_warehouse
  - has_parking
  - total_floors_count
  - location_latitude
  - location_longitude
  - neighborhood_slug

outliers:
  building_size_min: 20
  building_size_max: 3000
  price_value_min: 500000000
  price_value_max: 80000000000

split:
  test_size: 0.2
  random_state: 42

encoding:
  target_encoder_cols:
    - neighborhood_slug
    - city_slug
  target_encoder_smoothing: 10
  boolean_columns:
    - is_rebuilt
    - has_business_deed
  categorical_columns:
    - cat2_slug
    - cat3_slug
    - deed_type
    - rooms_count
    - floor_material
    - luxury_score
    - non_luxury_score
    - building_age
    - floor_cat
    - total_floors_cat

models:
  random_forest:
    n_estimators: 355
    max_depth: 22
    min_samples_split: 13
    min_samples_leaf: 5
    random_state: 42
    n_jobs: -1
  lightgbm:
    n_estimators: 1147
    learning_rate: 0.013036971615551675
    num_leaves: 129
    max_depth: 22
    min_child_samples: 97
    subsample: 0.6410214697523549
    colsample_bytree: 0.6209832697195263
    random_state: 42
    n_jobs: -1

building_age:
  reference_year: 1404
  pre_1370_replacement: "1370"
  bins: [0, 5, 10, 20, 30]
  labels: [new, relatively_new, mid_age, old, very_old]
