task: credit
target_column: total_credit

# Filter: rows without sale price (rent/credit listings)
require_price_value_null: true

outliers:
  total_credit_min: 50000000
  total_credit_max: 80000000000
  building_size_min: 20
  building_size_max: 3000

split:
  test_size: 0.15
  val_size: 0.1275
  random_state: 42

rare_category:
  min_freq: 0.01
  other_label: Other

encoding:
  target_encoder_cols:
    - neighborhood_slug
    - city_slug
  target_encoder_smoothing: 10
  boolean_columns:
    - is_rebuilt
  categorical_columns:
    - cat2_slug
    - cat3_slug
    - luxury_items
    - non_luxury_items
    - floor
    - total_floors_count
    - building_age
    - unit_per_floor
    - rooms_count
    - has_warm_water_provider
    - has_heating_system
    - has_cooling_system
    - building_direction
    - floor_material
    - has_restroom

models:
  random_forest:
    n_estimators: 355
    max_depth: 22
    min_samples_split: 13
    min_samples_leaf: 5
    random_state: 42
    n_jobs: -1
  lightgbm:
    n_estimators: 1438
    learning_rate: 0.026898330387707108
    num_leaves: 141
    max_depth: 15
    min_child_samples: 41
    subsample: 0.7476375984955851
    colsample_bytree: 0.6303192344346847
    random_state: 42
    n_jobs: -1

building_age:
  reference_year: 1404
  pre_1370_replacement: "1370"
  bins: [0, 5, 10, 20, 30]
  labels: [new, relatively_new, mid_age, old, very_old]
